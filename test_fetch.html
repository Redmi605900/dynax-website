<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test Fetch</title>
<style>
body { background: #1a0a00; color: white; padding: 20px; font-family: monospace; }
.log { background: rgba(0,0,0,0.5); padding: 10px; margin: 10px 0; border-radius: 5px; }
.success { color: #34C759; }
.error { color: #FF3B30; }
.info { color: #F7931A; }
</style>
</head>
<body>
<h1>🧪 Test Fetch API</h1>
<div id="log"></div>

<script>
function log(msg, type) {
const div = document.createElement('div');
div.className = 'log ' + (type || '');
div.textContent = msg;
document.getElementById('log').appendChild(div);
console.log(msg);
}

const NODE_URL = window.location.origin;
log('📍 Node URL: ' + NODE_URL, 'info');

// ทดสอบ 1: Fetch แบบง่ายๆ
log('🔄 กำลังทดสอบ fetch...');
fetch(NODE_URL + '/')
.then(res => {
log('✅ Response status: ' + res.status, 'success');
return res.json();
})
.then(data => {
log('✅ Data: ' + JSON.stringify(data), 'success');
})
.catch(err => {
log('❌ Error: ' + err.message, 'error');
});

// ทดสอบ 2: Fetch Balance
setTimeout(() => {
const address = 'DXa5ae9ccc94279d4f52b4f4e694a5a3b2f4f5ece3';
log('🔄 กำลัง fetch balance ของ ' + address);
fetch(NODE_URL + '/balance/' + address)
.then(res => {
log('✅ Balance response: ' + res.status, 'success');
return res.json();
})
.then(data => {
log('✅ Balance: ' + data.balance + ' DYX', 'success');
})
.catch(err => {
log('❌ Balance error: ' + err.message, 'error');
});
}, 1000);

// ทดสอบ 3: Fetch Blocks
setTimeout(() => {
log('🔄 กำลัง fetch blocks...');
fetch(NODE_URL + '/blocks')
.then(res => {
log('✅ Blocks response: ' + res.status, 'success');
return res.json();
})
.then(data => {
log('✅ Total blocks: ' + data.length, 'success');
})
.catch(err => {
log('❌ Blocks error: ' + err.message, 'error');
});
}, 2000);
</script>
</body>
</html>
