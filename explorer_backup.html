<!DOCTYPE html>
<html>
<head>
<title>DYNAX Explorer</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
*{box-sizing:border-box}
body{background:#0a0e1a;color:#fff;font-family:Arial;margin:0;padding:20px}
h1{color:#00e5ff;text-align:center;margin-bottom:5px}
.sub{text-align:center;color:#aaa;margin-bottom:20px;font-size:13px}
.stats{display:flex;gap:15px;justify-content:center;margin:20px 0;flex-wrap:wrap}
.stat{background:#1a1e2e;padding:15px 20px;border-radius:10px;text-align:center;border:1px solid #00e5ff;min-width:130px}
.stat h2{color:#00e5ff;margin:0;font-size:24px}
.stat p{margin:5px 0;color:#aaa;font-size:12px}
.section{margin:25px 0}
.section h2{color:#00e5ff;border-bottom:1px solid #1a1e2e;padding-bottom:8px}
.block{background:#1a1e2e;margin:10px 0;padding:15px;border-radius:10px;border-left:4px solid #00e5ff}
.block h3{color:#00e5ff;margin:0 0 8px 0;font-size:16px}
.hash{font-family:monospace;color:#aaa;font-size:11px;word-break:break-all}
.tx{background:#0d1117;padding:8px 10px;border-radius:5px;margin:5px 0;font-size:12px}
.label{color:#aaa;font-size:11px;margin-top:6px}
.badge{display:inline-block;background:#00e5ff22;color:#00e5ff;border:1px solid #00e5ff44;border-radius:4px;padding:2px 8px;font-size:11px;margin-left:8px}
.search{display:flex;gap:10px;margin:15px 0}
.search input{flex:1;background:#1a1e2e;border:1px solid #00e5ff44;color:#fff;padding:10px;border-radius:8px;font-size:14px}
.search button{background:#00e5ff;color:#000;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-weight:bold}
.halving{background:#1a1e2e;padding:15px;border-radius:10px;border:1px solid #ff9800;margin:15px 0}
.halving h3{color:#ff9800;margin:0 0 8px 0}
.progress{background:#0d1117;border-radius:10px;height:10px;margin:8px 0}
.progress-bar{background:#ff9800;height:10px;border-radius:10px;transition:width 0.5s}
.peers{background:#1a1e2e;padding:12px;border-radius:10px;border:1px solid #00ff8844;margin:10px 0}
.peer{color:#00ff88;font-family:monospace;font-size:12px;padding:3px 0}
.loading{text-align:center;color:#aaa;padding:20px}
.error{color:#ff4444;text-align:center;padding:10px}
.green{color:#00ff88}
.refresh{float:right;background:none;border:1px solid #00e5ff44;color:#00e5ff;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px}
</style>
</head>
<body>
<h1>DYNAX Explorer</h1>
<p class="sub">Network ID: 1337 | Protocol: DYNAX/1.0 | <span class="green">Live</span></p>
<div class="stats" id="stats"><div class="loading">Loading...</div></div>
<div class="halving" id="halving-box" style="display:none">
<h3>Halving Info</h3>
<div id="halving-info"></div>
<div class="progress"><div class="progress-bar" id="halving-bar"></div></div>
</div>
<div class="section">
<h2>Search <button class="refresh" onclick="loadAll()">Refresh</button></h2>
<div class="search">
<input id="search-input" placeholder="Block number, TX ID, or Address..." onkeydown="if(event.key==='Enter')doSearch()">
<button onclick="doSearch()">Search</button>
</div>
<div id="search-result"></div>
</div>
<div class="section"><h2>Latest Blocks</h2><div id="blocks-list"><div class="loading">Loading...</div></div></div>
<div class="section"><h2>Network Peers</h2><div id="peers-list"><div class="loading">Loading...</div></div></div>
<script>
const NODE="https://dynax-node2.onrender.com";
function short(h,n=16){return h?h.slice(0,n)+"...":"-"}
async function loadStats(){
try{
const r=await fetch(NODE+"/");
const d=await r.json();
document.getElementById("stats").innerHTML=`
<div class="stat"><h2>${d.blocks}</h2><p>Blocks</p></div>
<div class="stat"><h2>${d.reward} DYX</h2><p>Block Reward</p></div>
<div class="stat"><h2>${d.difficulty}</h2><p>Difficulty</p></div>
<div class="stat"><h2>${d.mempool}</h2><p>Mempool TXs</p></div>
<div class="stat"><h2>${d.peers}</h2><p>Peers</p></div>
<div class="stat"><h2>11,000,000</h2><p>Max Supply DYX</p></div>`;
}catch(e){document.getElementById("stats").innerHTML='<div class="error">Cannot connect to node</div>';}
}
async function loadHalving(){
try{
const r=await fetch(NODE+"/halving");
const d=await r.json();
const pct=((d.current_block%210000)/210000*100).toFixed(1);
document.getElementById("halving-box").style.display="block";
document.getElementById("halving-info").innerHTML=`Current Reward: <b style="color:#ff9800">${d.current_reward} DYX</b> | Halvings Done: <b>${d.halvings_done}</b> | Next Halving: Block <b>#${d.next_halving_block}</b> (<b>${d.blocks_until_halving.toLocaleString()}</b> blocks away)`;
document.getElementById("halving-bar").style.width=pct+"%";
}catch(e){}
}
async function loadBlocks(){
try{
const r=await fetch(NODE+"/chain");
const blocks=await r.json();
const latest=blocks.slice().reverse().slice(0,10);
document.getElementById("blocks-list").innerHTML=latest.map(b=>`
<div class="block">
<h3>Block #${b.index}<span class="badge">difficulty: ${b.difficulty||4}</span></h3>
<div class="label">Hash:</div><div class="hash">${b.hash}</div>
<div class="label">Prev:</div><div class="hash">${b.prev_hash}</div>
<div class="label">Time: ${new Date(b.timestamp*1000).toLocaleString()} | TXs: ${b.tx_count}</div>
${b.transactions.map(tx=>`<div class="tx">${tx.from==="NETWORK"?"Mining Reward":"TX"} ${short(tx.from)} to ${short(tx.to)} | <b>${tx.amount} DYX</b></div>`).join("")}
</div>`).join("");
}catch(e){document.getElementById("blocks-list").innerHTML='<div class="error">Cannot load blocks</div>';}
}
async function loadPeers(){
try{
const r=await fetch(NODE+"/peers");
const d=await r.json();
document.getElementById("peers-list").innerHTML=`<div class="peers">${(!d.peers||d.peers.length===0)?'<div class="peer">No peers</div>':d.peers.map(p=>`<div class="peer">* ${p}</div>`).join("")}</div>`;
}catch(e){}
}
async function doSearch(){
const q=document.getElementById("search-input").value.trim();
if(!q)return;
const el=document.getElementById("search-result");
el.innerHTML='<div class="loading">Searching...</div>';
try{
if(/^\d+$/.test(q)){
const r=await fetch(NODE+"/block/"+q);
if(r.ok){const b=await r.json();el.innerHTML=`<div class="block"><h3>Block #${b.index}</h3><div class="hash">${b.hash}</div><div class="label">Time: ${new Date(b.timestamp*1000).toLocaleString()} | Nonce: ${b.nonce}</div>${b.transactions.map(tx=>`<div class="tx">${tx.from} to ${tx.to} | ${tx.amount} DYX</div>`).join("")}</div>`;return;}
}
if(q.startsWith("DX")){
const r=await fetch(NODE+"/balance/"+q);
if(r.ok){const d=await r.json();el.innerHTML=`<div class="block"><h3>Address</h3><div class="hash">${d.address}</div><h2 style="color:#00e5ff">${d.balance} DYX</h2></div>`;return;}
}
const r=await fetch(NODE+"/tx/"+q);
if(r.ok){const d=await r.json();el.innerHTML=`<div class="block"><h3>Transaction</h3><div class="label">Block: #${d.block}</div><div class="tx">${d.tx.from} to ${d.tx.to} | ${d.tx.amount} DYX</div></div>`;return;}
el.innerHTML='<div class="error">Not found</div>';
}catch(e){el.innerHTML='<div class="error">Search failed</div>';}
}
async function loadAll(){await Promise.all([loadStats(),loadHalving(),loadBlocks(),loadPeers()]);}
loadAll();
setInterval(loadAll,30000);
</script>
</body>
</html>
