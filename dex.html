<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DYNAX DEX</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; color: #f0c040; font-family: Arial, sans-serif; padding: 20px; }
.header { text-align: center; padding: 20px 0; border-bottom: 1px solid #333; margin-bottom: 20px; }
h1 { font-size: 28px; color: #f0c040; }
.subtitle { color: #888; font-size: 14px; margin-top: 5px; }
.card { background: #111; border: 1px solid #333; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
.card h2 { color: #f0c040; margin-bottom: 15px; font-size: 18px; }
.price-box { display: flex; justify-content: space-around; margin-bottom: 20px; }
.price-item { text-align: center; }
.price-value { font-size: 24px; font-weight: bold; color: #f0c040; }
.price-label { font-size: 12px; color: #888; margin-top: 5px; }
input { width: 100%; background: #0a0a0a; color: #f0c040; border: 1px solid #444; padding: 12px; border-radius: 8px; margin: 8px 0; font-size: 16px; }
select { width: 100%; background: #0a0a0a; color: #f0c040; border: 1px solid #444; padding: 12px; border-radius: 8px; margin: 8px 0; font-size: 16px; }
button { width: 100%; background: #f0c040; color: #000; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
button:hover { background: #ffd700; }
.result { margin-top: 15px; padding: 12px; background: #1a1a1a; border-radius: 8px; font-size: 14px; line-height: 1.6; }
.success { color: #4caf50; }
.error { color: #f44336; }
.pool-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.stat { background: #1a1a1a; padding: 12px; border-radius: 8px; text-align: center; }
.stat-value { font-size: 20px; font-weight: bold; }
.stat-label { font-size: 12px; color: #888; margin-top: 4px; }
.back { display: inline-block; margin-bottom: 20px; color: #f0c040; text-decoration: none; border: 1px solid #f0c040; padding: 8px 16px; border-radius: 4px; }
</style>
</head>
<body>
<a href="/" class="back">← หน้าหลัก</a>
<div class="header">
  <h1>⚡ DYNAX DEX</h1>
  <div class="subtitle">Decentralized Exchange — AMM (x*y=k)</div>
</div>

<div class="card">
  <h2>📊 Pool Status</h2>
  <div class="price-box">
    <div class="price-item">
      <div class="price-value" id="price">-</div>
      <div class="price-label">DYX/USDT</div>
    </div>
    <div class="price-item">
      <div class="price-value" id="dyx-reserve">-</div>
      <div class="price-label">DYX Reserve</div>
    </div>
    <div class="price-item">
      <div class="price-value" id="usdt-reserve">-</div>
      <div class="price-label">USDT Reserve</div>
    </div>
  </div>
  <button onclick="loadPool()">🔄 Refresh</button>
</div>

<div class="card">
  <h2>🔄 Swap</h2>
  <select id="token-in">
    <option value="DYX">DYX</option>
    <option value="USDT">USDT</option>
  </select>
  <input type="number" id="amount-in" placeholder="จำนวนที่ต้องการแลก">
  <select id="token-out">
    <option value="USDT">USDT</option>
    <option value="DYX">DYX</option>
  </select>
  <button onclick="doSwap()">⚡ Swap</button>
  <div id="swap-result" class="result" style="display:none"></div>
</div>

<div class="card">
  <h2>💧 Add Liquidity</h2>
  <select id="liq-token">
    <option value="DYX">DYX</option>
    <option value="USDT">USDT</option>
  </select>
  <input type="number" id="liq-amount" placeholder="จำนวนที่ต้องการเพิ่ม">
  <button onclick="addLiquidity()">➕ Add Liquidity</button>
  <div id="liq-result" class="result" style="display:none"></div>
</div>

<script>
const API = window.location.origin;

async function loadPool() {
  try {
    const r = await fetch(`${API}/dex/pool`);
    const d = await r.json();
    document.getElementById('price').textContent = d.price_dyx_usdt;
    document.getElementById('dyx-reserve').textContent = Math.round(d.DYX).toLocaleString();
    document.getElementById('usdt-reserve').textContent = Math.round(d.USDT).toLocaleString();
  } catch(e) {
    document.getElementById('price').textContent = 'Error';
  }
}

async function doSwap() {
  const tokenIn = document.getElementById('token-in').value;
  const tokenOut = document.getElementById('token-out').value;
  const amountIn = parseFloat(document.getElementById('amount-in').value);
  const el = document.getElementById('swap-result');
  el.style.display = 'block';
  if(!amountIn || amountIn <= 0) { el.innerHTML = '<span class="error">กรุณาใส่จำนวน</span>'; return; }
  if(tokenIn === tokenOut) { el.innerHTML = '<span class="error">เลือก token ต่างกัน</span>'; return; }
  el.innerHTML = 'กำลัง swap...';
  try {
    const r = await fetch(`${API}/dex/swap`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({token_in: tokenIn, token_out: tokenOut, amount_in: amountIn})
    });
    const d = await r.json();
    if(d.success) {
      el.innerHTML = `<span class="success">✅ ${d.swapped}<br>Rate: ${d.rate}</span>`;
      loadPool();
    } else {
      el.innerHTML = `<span class="error">❌ ${d.error}</span>`;
    }
  } catch(e) {
    el.innerHTML = `<span class="error">Error: ${e.message}</span>`;
  }
}

async function addLiquidity() {
  const token = document.getElementById('liq-token').value;
  const amount = parseFloat(document.getElementById('liq-amount').value);
  const el = document.getElementById('liq-result');
  el.style.display = 'block';
  if(!amount || amount <= 0) { el.innerHTML = '<span class="error">กรุณาใส่จำนวน</span>'; return; }
  try {
    const r = await fetch(`${API}/dex/liquidity`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({token, amount})
    });
    const d = await r.json();
    if(d.success) {
      el.innerHTML = `<span class="success">✅ เพิ่ม Liquidity สำเร็จ</span>`;
      loadPool();
    } else {
      el.innerHTML = `<span class="error">❌ ${d.error}</span>`;
    }
  } catch(e) {
    el.innerHTML = `<span class="error">Error: ${e.message}</span>`;
  }
}

loadPool();
</script>
</body>
</html>
