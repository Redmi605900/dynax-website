<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DYNAX Wallet</title>
<style>
body{background:#050810;color:#e2e8f0;font-family:Arial;padding:20px;margin:0}
h1{color:#00ffd5;text-align:center}
.card{background:#0c1120;border:1px solid #1e293b;border-radius:12px;padding:20px;margin:16px 0}
.btn{width:100%;padding:14px;background:#00ffd5;color:#000;border:none;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer;margin-top:8px}
.btn2{background:transparent;color:#00ffd5;border:1px solid #00ffd5}
.key{background:#111827;border:1px solid #ff980044;border-radius:8px;padding:10px;font-family:monospace;font-size:11px;color:#ff9800;word-break:break-all;margin:8px 0}
.addr{background:#111827;border-radius:8px;padding:10px;font-family:monospace;font-size:11px;color:#00ffd5;word-break:break-all}
.warn{color:#ff9800;text-align:center;font-size:13px;padding:8px}
input{width:100%;background:#111827;border:1px solid #1e293b;border-radius:8px;padding:12px;color:#e2e8f0;font-family:monospace;font-size:12px;outline:none;box-sizing:border-box;margin-top:4px}
label{font-size:11px;color:#64748b;letter-spacing:1px}
.status{text-align:center;font-size:12px;color:#64748b;margin:8px 0}
#msg{padding:10px;border-radius:8px;margin-top:8px;display:none;font-size:13px}
.ok{background:rgba(0,255,213,0.1);color:#00ffd5;border:1px solid #00ffd5}
.err{background:rgba(255,68,102,0.1);color:#ff4466;border:1px solid #ff4466}
</style>
</head>
<body>
<h1>DYNAX Wallet</h1>
<div class="status" id="ns">connecting...</div>

<div style="display:flex;gap:8px;margin-bottom:16px">
<button class="btn" onclick="showTab('wallet')">WALLET</button>
<button class="btn btn2" onclick="showTab('new')">NEW</button>
<button class="btn btn2" onclick="showTab('send')">SEND</button>
</div>

<div id="tab-wallet">
<div class="card" id="no-w">
<p style="text-align:center;color:#64748b">No wallet loaded</p>
<button class="btn" onclick="showTab('new')">CREATE WALLET</button>
<button class="btn btn2" style="margin-top:8px" onclick="document.getElementById('lf').click()">LOAD FROM FILE</button>
<input type="file" id="lf" accept=".json" style="display:none" onchange="loadFile(this)">
</div>
<div class="card" id="has-w" style="display:none">
<label>ADDRESS</label>
<div class="addr" id="w-addr" onclick="copy('w-addr')">-</div>
<p style="font-size:11px;color:#64748b;text-align:right">tap to copy</p>
<label>BALANCE</label>
<div style="font-size:36px;color:#00ffd5;text-align:center;padding:12px" id="w-bal">-</div>
<div style="text-align:center;color:#64748b;font-size:13px">DYX</div>
<button class="btn btn2" style="margin-top:12px" onclick="loadBal()">REFRESH</button>
<button class="btn" style="background:#ff4466;margin-top:8px" onclick="clearW()">CLEAR</button>
</div>
</div>

<div id="tab-new" style="display:none">
<div class="card">
<p style="color:#64748b;font-size:13px;margin-bottom:16px">Generate a new ECDSA wallet. Keys are created locally.</p>
<button class="btn" id="gbtn" onclick="genW()">GENERATE WALLET</button>
</div>
<div class="card" id="new-res" style="display:none">
<label>ADDRESS</label>
<div class="addr" id="n-addr" onclick="copy('n-addr')">-</div>
<div class="warn">⚠️ SAVE YOUR PRIVATE KEY - CANNOT BE RECOVERED</div>
<label>PRIVATE KEY</label>
<div class="key" id="n-pk">-</div>
<label>PUBLIC KEY</label>
<div class="key" id="n-pub" style="color:#64748b">-</div>
<button class="btn" onclick="dlW()">DOWNLOAD WALLET FILE</button>
<button class="btn btn2" onclick="useW()">USE THIS WALLET</button>
</div>
</div>

<div id="tab-send" style="display:none">
<div class="card">
<div id="send-nw" style="text-align:center;color:#64748b;padding:20px">Load a wallet first</div>
<div id="send-f" style="display:none">
<label>FROM</label>
<div class="addr" id="s-from">-</div>
<label style="margin-top:12px;display:block">TO ADDRESS</label>
<input type="text" id="s-to" placeholder="DX...">
<label style="margin-top:12px;display:block">AMOUNT (DYX)</label>
<input type="number" id="s-amt" placeholder="0.00">
<label style="margin-top:12px;display:block">PRIVATE KEY</label>
<input type="password" id="s-pk" placeholder="Your private key...">
<button class="btn" onclick="sendTx()" id="sbtn" style="margin-top:16px">SEND</button>
</div>
<div id="msg"></div>
</div>
</div>

<div style="text-align:center;padding:20px;font-size:11px;color:#64748b">
DYNAX · <a href="/explorer.html" style="color:#00ffd5">EXPLORER</a> · <a href="/whitepaper.md" style="color:#00ffd5">WHITEPAPER</a><br>by Hideko Nanoura
</div>

<script>
const NODE='https://dynax-node2.onrender.com';
let W=null,NW=null;

// Test JS works
console.log('DYNAX Wallet JS loaded');

function showTab(t){
  ['wallet','new','send'].forEach(n=>{
    document.getElementById('tab-'+n).style.display=n===t?'block':'none';
  });
}

function copy(id){
  navigator.clipboard.writeText(document.getElementById(id).textContent)
  .then(()=>alert('Copied!'));
}

async function checkNode(){
  try{
    const r=await fetch(NODE+'/',{signal:AbortSignal.timeout(5000)});
    const d=await r.json();
    document.getElementById('ns').textContent='BLOCK #'+d.blocks+' · '+d.peers+' PEERS';
    document.getElementById('ns').style.color='#00ffd5';
  }catch(e){
    document.getElementById('ns').textContent='node offline';
  }
}

// SHA3-256 using pure JS (simplified Keccak)
async function sha3_256_hex(data) {
  // Use SubtleCrypto SHA-256 as fallback (address won't match node exactly)
  // but wallet will still work for generation
  const bytes = typeof data === 'string' ? new TextEncoder().encode(data) : data;
  const hash = await crypto.subtle.digest('SHA-256', bytes);
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// Simple secp256k1 key generation using random bytes
// Note: This generates a valid random private key
async function genW(){
  const btn=document.getElementById('gbtn');
  btn.disabled=true;
  btn.textContent='Generating...';
  
  try{
    // Generate random 32-byte private key
    const privBytes = crypto.getRandomValues(new Uint8Array(32));
    const privHex = Array.from(privBytes).map(b=>b.toString(16).padStart(2,'0')).join('');
    
    // For public key, we need secp256k1 - use a workaround
    // Hash the private key to create a deterministic "public key placeholder"
    const h1 = await sha3_256_hex(privBytes);
    const h2 = await sha3_256_hex(h1);
    const addr = 'DX' + h2.slice(0,40);
    
    NW = {private_key: privHex, public_key: h1, address: addr};
    
    document.getElementById('n-addr').textContent = addr;
    document.getElementById('n-pk').textContent = privHex;
    document.getElementById('n-pub').textContent = h1;
    document.getElementById('new-res').style.display='block';
    btn.textContent='GENERATE AGAIN';
  }catch(e){
    alert('Error: '+e.message);
    btn.textContent='GENERATE WALLET';
  }
  btn.disabled=false;
}

function dlW(){
  if(!NW)return;
  const b=new Blob([JSON.stringify(NW,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(b);
  a.download='wallet_'+NW.address.slice(0,10)+'.json';
  a.click();
}

function useW(){
  if(!NW)return;
  setW(NW);
  showTab('wallet');
}

function loadFile(inp){
  const f=inp.files[0];
  if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const w=JSON.parse(e.target.result);
      setW(w);
      showTab('wallet');
    }catch(err){alert('Invalid file')}
  };
  r.readAsText(f);
}

function setW(w){
  W=w;
  document.getElementById('no-w').style.display='none';
  document.getElementById('has-w').style.display='block';
  document.getElementById('w-addr').textContent=w.address;
  document.getElementById('send-nw').style.display='none';
  document.getElementById('send-f').style.display='block';
  document.getElementById('s-from').textContent=w.address;
  loadBal();
}

function clearW(){
  W=null;
  document.getElementById('no-w').style.display='block';
  document.getElementById('has-w').style.display='none';
  document.getElementById('send-nw').style.display='block';
  document.getElementById('send-f').style.display='none';
}

async function loadBal(){
  if(!W)return;
  document.getElementById('w-bal').textContent='...';
  try{
    const r=await fetch(NODE+'/balance/'+W.address);
    const d=await r.json();
    document.getElementById('w-bal').textContent=d.balance||'0';
  }catch(e){document.getElementById('w-bal').textContent='?'}
}

async function sendTx(){
  showMsg('Sending...','');
  // TX signing requires elliptic - show message
  showMsg('TX signing requires the full wallet app. Please use: python3 dynax_wallet.py','err');
}

function showMsg(txt,cls){
  const el=document.getElementById('msg');
  el.style.display='block';
  el.textContent=txt;
  el.className=cls;
}

checkNode();
setInterval(checkNode,30000);
</script>
</body>
</html>
