<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DYNAX - Layer 1 Blockchain</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: sans-serif; background: linear-gradient(135deg, #1a0a00, #2d1810, #0a0a0a); color: white; min-height: 100vh; padding: 20px; }
.container { max-width: 1200px; margin: 0 auto; }
h1 { font-size: 48px; text-align: center; margin: 40px 0; background: linear-gradient(135deg, #F7931A, #FFA500); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.subtitle { text-align: center; color: #a0a0a0; margin-bottom: 40px; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
.stat { background: rgba(247,147,26,0.1); border: 2px solid rgba(247,147,26,0.3); border-radius: 16px; padding: 24px; text-align: center; }
.stat-value { font-size: 36px; font-weight: 700; color: #F7931A; }
.stat-label { font-size: 14px; color: #888; margin-top: 8px; }
.nav { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 24px; }
.nav a { background: rgba(247,147,26,0.1); border: 2px solid rgba(247,147,26,0.3); border-radius: 20px; padding: 40px 24px; text-align: center; text-decoration: none; color: #F7931A; font-size: 20px; font-weight: 600; transition: all 0.3s; }
.nav a:hover { transform: translateY(-8px); border-color: #F7931A; box-shadow: 0 20px 40px rgba(247,147,26,0.3); }
.status { text-align: center; margin-top: 40px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 12px; }
</style>
</head>
<body>
<div class="container">
<h1>DYNAX</h1>
<p class="subtitle">Decentralized Blockchain Layer 1<br>Quantum Resistant • No ICO</p>

<div class="stats">
<div class="stat"><div class="stat-value" id="blocks">...</div><div class="stat-label">BLOCKS</div></div>
<div class="stat"><div class="stat-value" id="txs">...</div><div class="stat-label">TRANSACTIONS</div></div>
<div class="stat"><div class="stat-value" id="nodes">1</div><div class="stat-label">NODES ONLINE</div></div>
<div class="stat"><div class="stat-value">DYX</div><div class="stat-label">SYMBOL</div></div>
</div>

<div class="nav">
<a href="/dex">💱 DEX</a>
<a href="/wallet">💰 Wallet</a>
<a href="/explorer">🔍 Explorer</a>
<a href="/mining">⛏️ Mining</a>
</div>

<div class="status" id="status">Loading network status...</div>
</div>

<script>
const API = 'https://dynax-node2.onrender.com';

async function load() {
    try {
        const chainRes = await fetch(API + '/chain');
        const chainData = await chainRes.json();
        const blocks = Array.isArray(chainData) ? chainData : (chainData.chain || []);
        
        const statusRes = await fetch(API + '/');
        const status = await statusRes.json();
        
        let txCount = 0;
        blocks.forEach(b => {
            if (b.transactions) txCount += b.transactions.length;
            else if (b.txs) txCount += b.txs.length;
        });
        
        document.getElementById('blocks').textContent = blocks.length;
        document.getElementById('txs').textContent = txCount;
        document.getElementById('status').innerHTML = 
            `✅ Network: ${status.network || 'DYNAX'} | Blocks: ${blocks.length} | Mempool: ${status.mempool || 0}`;
        
        console.log('✅ Loaded:', blocks.length, 'blocks,', txCount, 'txs');
    } catch(e) {
        document.getElementById('status').innerHTML = '❌ Error: ' + e.message;
        console.error('Error:', e);
    }
}

load();
setInterval(load, 30000);
</script>
</body>
</html>
